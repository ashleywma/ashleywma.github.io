<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Work project" />
    <title>bwl_dashboard // project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">skip to content</a>

    <div class="app-shell app-shell--sidebar-collapsed">
      <aside class="sidebar" id="sidebar-panel" aria-label="Explorer">
        <div id="sidebar-root"></div>
      </aside>

      <div class="app-column">
        <header class="site-header">
          <div class="site-header__inner">
            <div class="site-header__start">
              <a class="logo" href="/index.html">~/site</a>
            </div>
            <div class="site-header__actions">
              <button
                type="button"
                class="theme-toggle"
                id="theme-toggle"
                aria-label="Switch to midnight theme"
                aria-pressed="false"
                title="Midnight mode"
              >
                <span class="theme-toggle__icon" aria-hidden="true">◐</span>
                <span class="theme-toggle__label">midnight</span>
              </button>
            </div>
          </div>
        </header>

        <main id="main">
          <article class="section wrap doc">
            <p class="muted"><a href="/employment.html">← employment / overview.html</a></p>
            <p class="muted comment">// projects / bwl_dashboard.html</p>
            <h1><span class="prompt" aria-hidden="true"></span>BWL dashboard</h1>
            <p>
              Stack, metrics, stakeholders, and what you owned end-to-end. Screenshots or diagrams
              can sit below as <span class="value">img</span> tags when you are ready.
            </p>
          </article>
        </main>

        <footer class="site-footer">
          <div class="wrap site-footer__inner">
            <p class="muted">
              <span class="prompt" aria-hidden="true"></span>© <span id="year"></span> — plain HTML/CSS/JS
            </p>
          </div>
        </footer>
      </div>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
